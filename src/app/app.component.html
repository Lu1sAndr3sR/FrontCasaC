<router-outlet></router-outlet>

<!-- Toast de mensajes del sistema -->
<div class="msg-toast" [class.visible]="toastService.visible" [ngClass]="toastService.tipo">
  {{ toastService.mensaje }}
</div>

<!-- Modal de confirmación global -->
<div class="confirm-backdrop" *ngIf="confirmService.visible">
  <div class="confirm-box">
    <p class="confirm-msg">{{ confirmService.mensaje }}</p>
    <p class="confirm-detalle" *ngIf="confirmService.detalle">{{ confirmService.detalle }}</p>
    <div class="confirm-btns">
      <button class="btn-cancel-confirm" (click)="confirmService.responder(false)">Cancelar</button>
      <button class="btn-ok-confirm" (click)="confirmService.responder(true)">Aceptar</button>
    </div>
  </div>
</div>

<div class="toast-notification" 
     [class.show]="mostrarAlerta" 
     (click)="irANotificaciones()">
     
  <div class="toast-content">
    <div class="toast-icon">🔔</div>
    
    <div class="toast-text">
      <h4>Aviso de Sistema</h4>
      <p>{{ mensajeAlerta }}</p>
      <span style="font-size: 10px; color: #888; margin-top: 5px; display: block;">
        Clic para ver detalles →
      </span>
    </div>

    <button class="toast-close" (click)="cerrarAlerta($event)">×</button>
  </div>
  
</div>
